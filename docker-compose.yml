version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: retro_cloudgame
      POSTGRES_USER: retro_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retro_user -d retro_cloudgame"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: packages/auth-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://retro_user:secure_password@postgres:5432/retro_cloudgame
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: production-access-secret-change-me
      JWT_REFRESH_SECRET: production-refresh-secret-change-me
      JWT_ACCESS_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      PORT_AUTH: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  game-service:
    build:
      context: .
      dockerfile: packages/game-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://retro_user:secure_password@postgres:5432/retro_cloudgame
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: production-access-secret-change-me
      PORT_GAME: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  save-service:
    build:
      context: .
      dockerfile: packages/save-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://retro_user:secure_password@postgres:5432/retro_cloudgame
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: production-access-secret-change-me
      PORT_SAVE: 3003
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: packages/media-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://retro_user:secure_password@postgres:5432/retro_cloudgame
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: production-access-secret-change-me
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: emu-matrix
      PORT_MEDIA: 3004
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    environment:
      PORT_GATEWAY: 3000
      PORT_AUTH: 3001
      PORT_GAME: 3002
      PORT_SAVE: 3003
      PORT_MEDIA: 3004
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - game-service
      - save-service
      - media-service

  ws-service:
    build:
      context: .
      dockerfile: packages/ws-service/Dockerfile
    environment:
      JWT_ACCESS_SECRET: production-access-secret-change-me
      PORT_WS: 3005
      FRONTEND_URL: http://localhost
    ports:
      - "3005:3005"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway
      - ws-service

volumes:
  pg_data:
  redis_data:
  minio_data:
